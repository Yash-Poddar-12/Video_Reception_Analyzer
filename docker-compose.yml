# ==============================================================================
# docker-compose.yml — Video Reception Analyzer (VRA)
# ==============================================================================
#
# Services:
#   python   — FastAPI MSSF inference service  (port 8000)
#   backend  — Node.js/Express + Rscript API    (port 3001)
#   frontend — Next.js web application          (port 3000)
#
# Shared volumes let all services read/write models, tmp, exports, and logs.
# ==============================================================================

version: "3.9"

services:
  # ── Python MSSF Inference Service ─────────────────────────────────────────
  python:
    build:
      context: .
      dockerfile: python/Dockerfile
    container_name: vra-python
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      # Persist trained model checkpoints across restarts
      - ./models:/app/models
      # Shared temp / output files between backend ↔ python
      - ./tmp:/app/tmp
      - ./logs:/app/logs
    networks:
      - vra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # give the model time to load

  # ── Backend Node.js + R API ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vra-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - R_EXECUTABLE=Rscript
      - R_SCRIPTS_PATH=/app/r
      - MODELS_PATH=/app/models
      - TMP_DIR=/app/tmp
      # Point to the python service using the Docker service name
      - PYTHON_SERVICE_URL=http://python:8000
      # Allow requests from the frontend container and localhost
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ./models:/app/models
      - ./tmp:/app/tmp
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./data:/app/data
    depends_on:
      python:
        condition: service_healthy
    networks:
      - vra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend Next.js Web App ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # The browser talks directly to the backend on its exposed port
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
        NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
    container_name: vra-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_POWERBI_EMBED_URL=${NEXT_PUBLIC_POWERBI_EMBED_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vra-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

# ==============================================================================
# Networks & Volumes
# ==============================================================================
networks:
  vra-net:
    driver: bridge
